name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*" # Pre-releases like v0.2.0-beta.1

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Get the tag name
          TAG_NAME="${GITHUB_REF#refs/tags/}"

          # Get the previous tag (if exists)
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # Generate release notes
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "## What's Changed" > release_notes.md
            echo "" >> release_notes.md
            echo "### Features & Improvements" >> release_notes.md
            git log ${PREVIOUS_TAG}..${TAG_NAME} --pretty=format:"- %s" --grep="feat\|feature" >> release_notes.md || echo "No features in this release" >> release_notes.md
            echo "" >> release_notes.md
            echo "### Bug Fixes" >> release_notes.md
            git log ${PREVIOUS_TAG}..${TAG_NAME} --pretty=format:"- %s" --grep="fix\|bugfix" >> release_notes.md || echo "No bug fixes in this release" >> release_notes.md
            echo "" >> release_notes.md
            echo "### Maintenance" >> release_notes.md
            git log ${PREVIOUS_TAG}..${TAG_NAME} --pretty=format:"- %s" --grep="chore\|refactor\|perf" >> release_notes.md || echo "No maintenance updates in this release" >> release_notes.md
            echo "" >> release_notes.md
            echo "### Documentation" >> release_notes.md
            git log ${PREVIOUS_TAG}..${TAG_NAME} --pretty=format:"- %s" --grep="docs" >> release_notes.md || echo "No documentation updates in this release" >> release_notes.md
            echo "" >> release_notes.md
            echo "---" >> release_notes.md
            echo "" >> release_notes.md
            echo "### Full Changelog" >> release_notes.md
            echo "See [full changelog](https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${TAG_NAME}) for all commits." >> release_notes.md
          else
            echo "## Initial Release" > release_notes.md
            echo "" >> release_notes.md
            echo "This is the first release of ClickLens!" >> release_notes.md
            echo "" >> release_notes.md
            echo "### Recent Commits" >> release_notes.md
            git log --pretty=format:"- %s" -10 >> release_notes.md
          fi

          # Add installation instructions
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "## Quick Start" >> release_notes.md
          echo "" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "docker pull ghcr.io/${{ github.repository }}:${TAG_NAME}" >> release_notes.md
          echo '```' >> release_notes.md

          # Save to file for next step
          cat release_notes.md

          # Set output
          {
            echo 'notes<<EOF'
            cat release_notes.md
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-docker:
    name: release-docker
    needs: create-release
    uses: ./.github/workflows/base.yml
    with:
      job-type: docker
      clickhouse-versions: '["24.5","24.6","24.12","25.1", "25.12"]'
      platforms: linux/amd64,linux/arm64
      push-image: true
